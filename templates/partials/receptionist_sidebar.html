 <aside class="w-64 bg-card border-r border-border flex flex-col fixed h-full">
    <!-- Logo -->
    <div class="p-6 border-b border-border">
      <div class="flex items-center gap-3">
        <div>
          <h1 class="text-lg font-bold text-foreground">EmotiCare</h1>
          <p class="text-xs text-muted-foreground">Receptionist Portal</p>
        </div>
      </div>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 p-4 space-y-1">
      <a href="{% url 'core:receptionist_dashboard' %}" class="sidebar-link {% if request.resolver_match.url_name == 'receptionist_dashboard' %}active{% endif %} flex items-center gap-3 px-4 py-3 {% if request.resolver_match.url_name == 'receptionist_dashboard' %}text-foreground{% else %}text-muted-foreground{% endif %} rounded-lg transition-all">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
        </svg>
        <span class="font-medium">Dashboard</span>
      </a>
      <a href="{% url 'core:receptionist_patients' %}" class="sidebar-link {% if request.resolver_match.url_name == 'receptionist_patients' %}active{% endif %} flex items-center gap-3 px-4 py-3 {% if request.resolver_match.url_name == 'receptionist_patients' %}text-foreground{% else %}text-muted-foreground{% endif %} rounded-lg transition-all">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
        </svg>
        <span class="font-medium">Patients</span>
      </a>
      <a href="{% url 'core:receptionist_sessions' %}" class="sidebar-link {% if request.resolver_match.url_name == 'receptionist_sessions' %}active{% endif %} flex items-center gap-3 px-4 py-3 {% if request.resolver_match.url_name == 'receptionist_sessions' %}text-foreground{% else %}text-muted-foreground{% endif %} rounded-lg transition-all">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
        </svg>
        <span class="font-medium">Sessions</span>
      </a>
      <a href="{% url 'core:receptionist_alerts' %}" class="sidebar-link {% if request.resolver_match.url_name == 'receptionist_alerts' %}active{% endif %} flex items-center gap-3 px-4 py-3 {% if request.resolver_match.url_name == 'receptionist_alerts' %}text-foreground{% else %}text-muted-foreground{% endif %} rounded-lg transition-all">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path>
        </svg>
        <span class="font-medium">Alerts</span>
        {% if active_alerts_count > 0 %}
          <span class="ml-auto bg-alert-high text-white text-xs font-semibold px-2 py-0.5 rounded-full">{{ active_alerts_count }}</span>
        {% endif %}
      </a>
      <a href="{% url 'core:receptionist_profile' %}" class="sidebar-link {% if request.resolver_match.url_name == 'receptionist_profile' or request.resolver_match.url_name == 'update_profile' or request.resolver_match.url_name == 'change_password' %}active{% endif %} flex items-center gap-3 px-4 py-3 {% if request.resolver_match.url_name == 'receptionist_profile' or request.resolver_match.url_name == 'update_profile' or request.resolver_match.url_name == 'change_password' %}text-foreground{% else %}text-muted-foreground{% endif %} rounded-lg transition-all">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
        </svg>
        <span class="font-medium">Profile</span>
      </a>
    </nav>

    <!-- User Info -->
    <div class="p-4 border-t border-border">
      <div class="flex items-center gap-3 p-3 bg-secondary rounded-xl">
        <div class="w-10 h-10 bg-primary/20 rounded-full flex items-center justify-center text-primary font-semibold">
          {{ request.user.first_name|slice:":1" }}{{ request.user.last_name|slice:":1" }}
        </div>
        <div class="flex-1 min-w-0">
          <p class="text-sm font-medium text-foreground truncate">{{ request.user.first_name }} {{ request.user.last_name }}</p>
          <p class="text-xs text-muted-foreground">Receptionist</p>
        </div>
        <a href="{% url 'core:logout' %}" class="p-2 text-muted-foreground hover:text-foreground transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
          </svg>
        </a>
      </div>
    </div>
  </aside>
